name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage (100% thresholds enforced)
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          # A placeholder is enough for the build; the key is only used at request time.
          GOOGLE_GENERATIVE_AI_API_KEY: ci-placeholder-not-a-real-key
